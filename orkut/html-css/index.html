<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orkut</title>
    <link rel="shortcut icon" href="orkut.png" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="logo">
      <img src="https://orkut-login.vercel.app/logo.png" alt="">
    </div>
    <div class="content-login">
        <form class="content-login-box">
            <div class="message">
                <p id="phase">Acesse o
                <span style="color:var(--color-pink2);">Orkut</span> com a sua conta
                <span style="color: #4361ee;">G</span>
                <span style="color: #e8258e;">o</span>
                <span style="color: #ffbe0b;">o</span>
                <span style="color: #4361ee;">G</span>
                <span style="color: #06d6a0;">l</span>
                <span style="color: #e8258e;">e</span>
                !
                 </p>
            </div>
            <input type="text" class="inputs" placeholder="E-mail ou número de celular">
            <input type="password" class="inputs" placeholder="Senha">
            <div class="remember-container">
              <input type="checkbox" class="checkbox">
              <span class="remember-me">Lembrar sempre do meu acesso</span>
            </div>
            <button class="btn btn-enter">Entrar</button>
            <a href="#" class="forgot-password">Esqueci minha senha ou e-mail</a>
            <div class="signup">
            <span class="no-account">Não tem conta?</span>
            <span class="create-account">Criar agora</span>
            </div>
        </form>

    </div>
      
</body>
</html>
