<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>projeto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="item active" style="--background: #EA3D41;">
            <div class="title">Strawberry</div>
            <img src="imagens/Morango-refrigerante-foregroundBlur.png" alt="lata refri" class="fruit">

            <img src="./imagens/Morango-refrigerante.png" alt="Strawberry" class="soad">
        </div>☺
        
        <div class="item" style="--background: #2D5643;">
            <div class="title">Avocado</div>
            <img src="imagens/Abacate-refrigerante-foregroundBlur.png" alt="lata refri" class="fruit">

            <img src="./imagens/Abacate-refrigerante.png" alt="Avocado" class="soad">
        </div>

        <div class="item" style="--background: #e7a043;">
            <div class="title">Orenge</div>
            <img src="imagens/Laranja-refrigerante-foregroundBlur.png" alt="lata refri" class="fruit">

            <path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0M4.5 7.5a.5.5 0 0 0 0 1h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5z"/>
            </svg></button>
        </div>
    </div>
