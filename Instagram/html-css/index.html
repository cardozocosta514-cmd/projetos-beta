<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon"  href="icon.instagram.png">
</head>
<body>

    <div class="right">
        <div class="logo">
            <img src="insta icon.png" alt="icon">
        </div>

        <div class="content">
            <h3>Veja momentos do dia a dia <br>dos seus
            <span>amigos proximos</span>.</h3>
        </div>

        <div class="charm">
            <img src="instagram.png" alt="charm">
        </div>
    </div>


    <div class="left">
        <div class="form">
            <h3 class="title">Entrar no instagram</h3>
                <div class="field">
                    <input type="email" id="email" required>
                    <label for="email">Número de celular, nome de usuário ou email</label>          
                </div>
                <div class="field">
                    <input type="password" id="senha" required>
                    <label for="senha">Senha</label>
                </div>  
                <div class="buttons">
                    <button class="btn-enter">Entrar</button>
                    <button class="forgetpass">Esqueceu a senha</button>
                    <button class="btn-facebook">
                        <svg viewBox="0 0 24 24" fill="#0064E0" width="1em" height="1em" class="x1lliihq x2lah0s x1k90msu x2h7rmj x1qfuztq xvpmsi5 xlup9mm x1kky2od"><path d="M22 12.037C22 6.494 17.523 2 12 2S2 6.494 2 12.037c0 4.707 3.229 8.656 7.584 9.741v-6.674H7.522v-3.067h2.062v-1.322c0-3.416 1.54-5 4.882-5 .634 0 1.727.125 2.174.25v2.78a12.807 12.807 0 0 0-1.155-.037c-1.64 0-2.273.623-2.273 2.244v1.085h3.266l-.56 3.067h-2.706V22C18.164 21.4 22 17.168 22 12.037z"></path></svg>
                        entrar com o Facebook
                    </button>
                    <button class="btn-create-account">Criar nova conta</button>
                </div>
                
    </div>
</body>
</html>
