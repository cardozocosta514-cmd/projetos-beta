<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X. O que está acontecendo</title>
  <link rel="stylesheet" href="i.css">
</head>
<body>

  <div class="container">

    <div class="left">
      <svg class="logo"
        viewBox="0 0 24 24"
        aria-hidden="true">
        <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"/>
      </svg>
    </div>

    <div class="right">

      <div class="content">
        <h1>Acontecendo agora</h1>
        <h3>Inscreva-se hoje</h3>
      </div>

      <div class="buttons">

        <button class="btn social">
          <img src="google--logo-svg.svg" alt="">
          Inscrever-se no Google
        </button>

        <button class="btn social">
          <img src="apple-black-logo-svg.svg" alt="">
          Inscrever-se com Apple
        </button>

        <div class="divider">
          <span>OU</span>
        </div>

        <button class="btn primary">
          Criar conta
        </button>

        <p class="terms">
          Ao se inscrever, você concorda com os
          <a href="#">Termos de Serviço</a>,
          <a href="#">Política de Privacidade</a> e
          <a href="#">Uso de Cookies</a>.
        </p>

        <span class="have-account">Já tem uma conta?</span>

        <button class="btn outline">
          Entrar
        </button>

        <button class="btn outline">
          <svg class="mini-logo" viewBox="0 0 24 24">
            <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"/>
          </svg>
          Baixe o aplicativo
        </button>

      </div>
    </div>

  </div>

</body>
</html>
